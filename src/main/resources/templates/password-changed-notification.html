<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoreRouter — Password Change Notice</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body style="margin:0;padding:0;background-color:#f2f1ee;font-family:'DM Sans',Helvetica,Arial,sans-serif;">

  <span style="display:none;font-size:1px;color:#f2f1ee;line-height:1px;max-height:0;max-width:0;opacity:0;overflow:hidden;">
    Your password was changed on CoreRouter.
  </span>

  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f2f1ee;">
    <tr>
      <td align="center" style="padding:56px 20px 64px;">
        <table width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:460px;">
          <tr>
            <td style="padding-bottom:44px;">
              <table width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td valign="middle">
                    <span style="font-family:'DM Sans',Helvetica,Arial,sans-serif;font-size:13px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:#1a1a1a;">CoreRouter</span>
                  </td>
                  <td align="right" valign="middle">
                    <span style="font-family:'DM Mono','Courier New',monospace;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:#b0a99e;font-weight:400;">Security</span>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <tr>
            <td style="padding-bottom:44px;"><div style="height:1px;background-color:#dedad4;"></div></td>
          </tr>

          <tr>
            <td style="padding-bottom:10px;">
              <p style="margin:0;font-family:'DM Sans',Helvetica,Arial,sans-serif;font-size:11px;font-weight:400;letter-spacing:0.18em;text-transform:uppercase;color:#a09890;">Hello, {{USERNAME}}</p>
            </td>
          </tr>

          <tr>
            <td style="padding-bottom:28px;">
              <h1 style="margin:0;font-family:'Playfair Display',Georgia,serif;font-size:30px;font-weight:400;color:#1a1a1a;letter-spacing:-0.01em;line-height:1.35;">Your password<br/>was changed.</h1>
            </td>
          </tr>

          <tr>
            <td style="padding-bottom:36px;">
              <p style="margin:0;font-family:'DM Sans',Helvetica,Arial,sans-serif;font-size:14px;font-weight:300;color:#7a7269;line-height:1.85;letter-spacing:0.01em;">{{MESSAGE}}</p>
            </td>
          </tr>

          <tr>
            <td style="padding-bottom:36px;">
              <table width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td style="background-color:#ffffff;border:1px solid #e4e0da;padding:24px 28px;">
                    <span style="font-family:'DM Mono','Courier New',monospace;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:#c0b9b0;">Event Time</span>
                    <p style="margin:10px 0 0;font-family:'DM Sans',Helvetica,Arial,sans-serif;font-size:14px;color:#1a1a1a;">{{EVENT_TIME}}</p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <tr>
            <td style="padding-bottom:44px;">
              <p style="margin:0;font-family:'DM Sans',Helvetica,Arial,sans-serif;font-size:12px;font-weight:300;color:#b0a99e;line-height:1.8;letter-spacing:0.01em;">
                If this wasn't you, reset your password immediately and contact support.
              </p>
            </td>
          </tr>

          <tr>
            <td style="padding-bottom:28px;"><div style="height:1px;background-color:#dedad4;"></div></td>
          </tr>

          <tr>
            <td>
              <table width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td><span style="font-family:'DM Sans',Helvetica,Arial,sans-serif;font-size:10px;font-weight:400;letter-spacing:0.1em;color:#c8c0b6;text-transform:uppercase;">CoreRouter &copy; 2025</span></td>
                  <td align="right"><span style="font-family:'DM Mono','Courier New',monospace;font-size:10px;color:#c8c0b6;letter-spacing:0.06em;">corerouter.me</span></td>
                </tr>
              </table>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>

</body>
</html>
